<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
display:flex;
background:#f4f7fc;
}

.sidebar{
width:250px;
height:100vh;
background:#1f2937;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:15px;
cursor:pointer;
}

.sidebar li:hover{
background:#374151;
border-radius:10px;
}

.main{
flex:1;
padding:30px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
flex:1;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:15px;
border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Cloud Storage</h2>

<ul>
<li>🏠 Dashboard</li>
<li>📁 My Files</li>
<li>⬆ Upload File</li>
<li>📤 Shared Files</li>
<li>📈 Analytics</li>
<li>⚙ Settings</li>
<li>🚪 Logout</li>
</ul>
</div>

<div class="main">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Files</h3>
<h2>124</h2>
</div>

<div class="card">
<h3>Storage Used</h3>
<h2>2.5 GB</h2>
</div>

<div class="card">
<h3>Shared Files</h3>
<h2>18</h2>
</div>

</div>

<table>

<tr>
<th>File Name</th>
<th>Size</th>
<th>Date</th>
<th>Action</th>
</tr>

<tr>
<td>Resume.pdf</td>
<td>2 MB</td>
<td>23-06-2026</td>
<td>Download</td>
</tr>

<tr>
<td>Project.zip</td>
<td>50 MB</td>
<td>23-06-2026</td>
<td>Delete</td>
</tr>

</table>

</div>

</body>
</html>
